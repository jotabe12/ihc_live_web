<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ViviEstu</title>
    <link rel="stylesheet" href="../css/iniciar_sesion.css">
</head>
<body>

  <div class="form-container">
    <div class="header">
      <div class="logo">
        <a href="../index.html">
          <img src="../asset/Logo.png" alt="Logo ViviEstu">
        </a>
      </div>
    </div>

    <div class="form-content">
      <h1>Bienvenido de vuelta</h1>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <button type="submit">Iniciar Sesión</button>
      </form>

      <div class="additional-options">
        <a href="#" class="link-option">¿Olvidaste tu contraseña?</a>
        <div class="separator">
          <span>o</span>
        </div>
        <a href="registrar.html" class="link-register">Crear una cuenta</a>
      </div>
    </div>
  </div>

  <!-- ============================== -->
  <!--  LOCALSTORAGE PARA LOGIN       -->
  <!-- ============================== -->

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      // Validación simple
      if (!email || !password) {
        alert("Completa todos los campos");
        return;
      }

      // Guardar usuario en el localStorage
      localStorage.setItem('usuario', email);

      // Redirigir al inicio
      window.location.href = '../index.html';
    });

    // Si ya está logeado, evitar que vuelva a login
    if (localStorage.getItem('usuario')) {
      // Si ya hay sesión, enviarlo al index automáticamente
      window.location.href = '../index.html';
    }
  </script>

</body>
</html>
